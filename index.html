  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    /* Custom scrollbar styling for webkit browsers */
    .scrollbar-thin {
      scrollbar-width: thin; /* For Firefox */
      scrollbar-color: #4B5563 #1F2937; /* thumb and track color For Firefox */
    }
    /* For Webkit-based browsers (Chrome, Safari, Edge) */
    .scrollbar-thin::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    .scrollbar-thin::-webkit-scrollbar-track {
      background: #1F2937; /* Or your track color e.g., gray-800 */
      border-radius: 10px;
    }
    .scrollbar-thin::-webkit-scrollbar-thumb {
      background-color: #4B5563; /* Or your thumb color e.g., gray-700 */
      border-radius: 10px;
      border: 2px solid #1F2937; /* Creates padding around thumb */
    }
    .scrollbar-thumb-gray-700::-webkit-scrollbar-thumb {
        background-color: #374151; /* gray-700 */
    }
    .scrollbar-track-gray-800::-webkit-scrollbar-track {
        background: #1f2937; /* gray-800 */
    }
    .shadow-up {
      box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1), 0 -2px 4px -1px rgba(0, 0, 0, 0.06);
    }
  </style>
